<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letter AI Positioning Preview</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">

const { useState, useMemo } = React;

const currentUseCases = [
  { title: "Sales", desc: "Use-case based messaging" },
  { title: "Enablement", desc: "Use-case based messaging" },
  { title: "Customer Experience", desc: "Use-case based messaging" }
];

const segments = [
  {
    id: "startup",
    label: "Startups",
    headline: "Turn founder knowledge into scalable revenue execution",
    pain: "No structured enablement. Founders still carry the pitch.",
    promise: "Convert founder instinct into repeatable execution.",
    revenue: "Land with onboarding → expand into coaching",
    metrics: ["Ramp speed", "Time to first pitch"]
  },
  {
    id: "mid",
    label: "Mid-market",
    headline: "Standardize revenue performance",
    pain: "Inconsistent execution across reps",
    promise: "Create repeatable readiness layer",
    revenue: "Land → expand into analytics + CX",
    metrics: ["Deal velocity", "Performance variance"]
  },
  {
    id: "enterprise",
    label: "Enterprise",
    headline: "Drive behavior change at scale",
    pain: "LMS completion ≠ performance",
    promise: "Move to execution readiness",
    revenue: "Platform rollout + expansion",
    metrics: ["Behavior change", "Revenue impact"]
  }
];

const competitors = [
  "Mindtickle / Highspot → Enterprise positioning",
  "WorkRamp / Allego → Modular expansion",
  "Second Nature / Gong → Performance layer"
];

const stack = [
  "Market signals",
  "AI insights",
  "PMM narrative",
  "GTM activation",
  "Revenue insights"
];

function App() {
  const [mode, setMode] = useState("after");
  const [segmentId, setSegmentId] = useState("mid");

  const segment = useMemo(
    () => segments.find(s => s.id === segmentId),
    [segmentId]
  );

  return (
    <div className="max-w-6xl mx-auto p-10">

      <h1 className="text-4xl font-bold mb-2">
        Letter AI Positioning Preview
      </h1>

      <p className="text-slate-500 mb-6">
        Preview by Pratyusha Endula for Letter AI
      </p>

      <div className="flex gap-4 mb-8">
        <button
          onClick={() => setMode("before")}
          className={`px-4 py-2 rounded ${mode==="before" ? "bg-black text-white" : "bg-white border"}`}
        >
          Before
        </button>

        <button
          onClick={() => setMode("after")}
          className={`px-4 py-2 rounded ${mode==="after" ? "bg-black text-white" : "bg-white border"}`}
        >
          After
        </button>
      </div>

      {mode === "before" ? (
        <div className="grid md:grid-cols-3 gap-4 mb-10">
          {currentUseCases.map((item) => (
            <div className="bg-white p-4 rounded shadow">
              <h3 className="font-bold">{item.title}</h3>
              <p className="text-sm text-slate-500">{item.desc}</p>
            </div>
          ))}
        </div>
      ) : (
        <div>
          <div className="grid md:grid-cols-3 gap-4 mb-6">
            {segments.map((s) => (
              <div
                onClick={() => setSegmentId(s.id)}
                className={`p-4 rounded cursor-pointer border ${
                  s.id === segmentId
                    ? "border-cyan-500 bg-cyan-50"
                    : "bg-white"
                }`}
              >
                <h3 className="font-bold">{s.label}</h3>
                <p className="text-sm">{s.headline}</p>
              </div>
            ))}
          </div>

          <div className="bg-white p-6 rounded shadow">
            <h2 className="text-xl font-bold mb-2">{segment.label}</h2>
            <p className="mb-2"><b>Pain:</b> {segment.pain}</p>
            <p className="mb-2"><b>Promise:</b> {segment.promise}</p>
            <p className="mb-2"><b>Revenue:</b> {segment.revenue}</p>
          </div>
        </div>
      )}

      <h2 className="text-2xl font-bold mt-10 mb-4">
        Competitive Insight
      </h2>
      <ul className="mb-6">
        {competitors.map(c => <li>• {c}</li>)}
      </ul>

      <h2 className="text-2xl font-bold mb-4">
        AI-native GTM Stack
      </h2>
      <div className="grid md:grid-cols-5 gap-3 mb-10">
        {stack.map(s => (
          <div className="bg-white p-3 rounded shadow text-sm text-center">
            {s}
          </div>
        ))}
      </div>

      <div className="bg-black text-white p-6 rounded">
        <h2 className="text-xl font-bold mb-2">
          Final POV
        </h2>
        <p>
          AI is not improving training. It is raising the bar for performance.
        </p>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
